<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BimsaraPOS - Customers</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="dashboard.html" class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94.63 1.5 1.98 2.63 3.61 2.96V19H7v2h10v-2h-4v-3.1c1.63-.33 2.98-1.46 3.61-2.96C19.08 12.63 21 10.55 21 8V7c0-1.1-.9-2-2-2zM5 8V7h2v3.82C5.84 10.4 5 9.3 5 8zm14 0c0 1.3-.84 2.4-2 2.82V7h2v1z"/>
                    </svg>
                </div>
                <span class="logo-text">Bimsara<span>POS</span></span>
            </a>

            <div class="nav-links">
                <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-house"></i>Home</a>
                <a href="customer.html" class="nav-link active"><i class="fa-solid fa-user"></i>Customers</a>
                <a href="item.html" class="nav-link"><i class="fa-solid fa-store"></i>Items</a>
                <a href="place-order.html" class="nav-link"><i class="fa-solid fa-cart-plus"></i>Place Order</a>
            </div>

            <a href="login.html" class="logout-btn">Logout</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="page-header">
            <h1>Manage Customers</h1>
        </div>

        <div class="content-grid">
            <!-- Customer Form -->
            <div class="form-card">
                <div class="card-header">
                    <h2><i class="fa-solid fa-user-plus" style="color: var(--primary); margin-right: 10px;"></i>Customer Details</h2>
                </div>
                <div class="card-body">
                    <form>
                        <div class="form-group">
                            <label for="customerId"><i class="fa-solid fa-id-badge" style="margin-right: 6px;"></i>Customer ID</label>
                            <input type="text" id="customerId" placeholder="C001" readonly>
                        </div>

                        <div class="form-group">
                            <label for="customerName"><i class="fa-solid fa-user" style="margin-right: 6px;"></i>Full Name</label>
                            <input type="text" id="customerName" placeholder="Chathunga Bimsara">
                        </div>

                        <div class="form-group">
                            <label for="customerAddress"><i class="fa-solid fa-location-dot" style="margin-right: 6px;"></i>Address</label>
                            <input type="text" id="customerAddress" placeholder="Galle, Sri Lanka">
                        </div>

                        <div class="form-group">
                            <label for="customerSalary"><i class="fa-solid fa-money-bill-wave" style="margin-right: 6px;"></i>Salary</label>
                            <input type="text" id="customerSalary" placeholder="100000.00">
                        </div>

                        <div class="btn-group">
                            <button type="submit" class="btn btn-primary"><i class="fa-solid fa-floppy-disk"></i> Save</button>
                            <button type="button" class="btn btn-secondary"><i class="fa-solid fa-pen-to-square"></i> Update</button>
                            <button type="button" class="btn btn-danger"><i class="fa-solid fa-trash"></i> Delete</button>
                            <button type="button" class="btn btn-light"><i class="fa-solid fa-eraser"></i> Clear</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Customer Table -->
            <div class="table-card">
                <div class="table-header">
                    <h2><i class="fa-solid fa-users" style="color: var(--primary); margin-right: 10px;"></i>All Customers</h2>
                    <div class="search-box">
                        <input type="text" placeholder="Search customers...">
                        <button type="button"><i class="fa-solid fa-magnifying-glass"></i></button>
                    </div>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Address</th>
                                <th>Salary</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td colspan="4" style="text-align: center; color: var(--text-light); padding: 50px;">
                                    <i class="fa-solid fa-users-slash fa-2x" style="display: block; margin-bottom: 10px; opacity: 0.5;"></i>
                                    No customers found. Add your first customer.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-container">
            <p>&copy; 2026 <span>BimsaraPOS</span>. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
